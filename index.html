<!DOCTYPE html>
<html>
<head>
<title>Bela AI Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg, #0a0a0a, #111827, #06b6d4);
overflow:hidden;
}

.login-card{
text-align:center;
width:90%;
max-width:400px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);

padding:25px;
border-radius:30px;

box-shadow:0 0 30px rgba(6,182,212,0.3);
}

.character img{
width:280px;
animation:floatGirl 3s ease-in-out infinite;
}

@keyframes floatGirl{
50%{
transform:translateY(-12px);
}
}

.logo{
font-size:32px;
font-weight:bold;
color:white;
margin-bottom:15px;
text-shadow:0 0 15px hotpink;
}

input{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:30px;
font-size:16px;
outline:none;
}

button{
width:100%;
padding:15px;
margin-top:20px;
border:none;
border-radius:30px;
background:white;
color:#ff1493;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.03);
}
</style>
</head>

<body>

<div class="login-card">

<div class="character">
<img src="anime-girl.png">
</div>

<div class="logo">
❤️ Bela AI ❤️
</div>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">
Login
</button>

</div>

<script>
function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

if(username==="" || password===""){
alert("Username aur Password bharo");
return;
}

window.location.href="index.html";
}
</script>

</body>
</html>
