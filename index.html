<!DOCTYPE html>
<html>
<head>
<title>Bela AI</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#ffe4ec,#f3f4f6);
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#ff4d6d;
color:white;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.2);

position: sticky;
top: 0;
z-index: 100;
}  
#chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.user{
background:#4f46e5;
color:white;
padding:10px 14px;
border-radius:18px 18px 0 18px;
max-width:80%;
align-self:flex-end;
}

.bela{
background:white;
padding:10px 14px;
border-radius:18px 18px 18px 0;
max-width:80%;
align-self:flex-start;
box-shadow:0 2px 8px rgba(0,0,0,.1);
animation: pop 0.3s ease;
}

.bottom{
display:flex;
padding:10px;
background:white;
gap:8px;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:25px;
background:#eee;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:12px 20px;
border-radius:25px;
}
  @keyframes pop{
  from{
    transform:scale(0.9);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
  }
</style>
</head>

<body>

<div class="header">❤️ Bela AI ❤️</div>

<div id="chat">
<div class="bela">Hi, main Bela hoon ❤️</div>
</div>

<div class="bottom">
  <input type="text" id="msg" placeholder="Message Bela..." />
  <button onclick="sendMsg()">Send</button>
</div>

<script>
async function sendMsg() {
    let msg = document.getElementById("msg").value;
    if (!msg) return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `<div class="user">${msg}</div>`;
    document.getElementById("msg").value = "";

    try {
        const res = await fetch("/.netlify/functions/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: msg
            })
        });

        const data = await res.json();

        chat.innerHTML += `<div class="bela">${data.reply}</div>`;
        chat.scrollTop = chat.scrollHeight;

    } catch (err) {
        chat.innerHTML += `<div class="bela">Connection error 😢</div>`;
    }
}
</script>

</body>
</html>
