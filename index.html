<!DOCTYPE html>
<html>
<head>
<title>Bela AI</title>
<style>
body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

#chat{
height:300px;
background:white;
padding:10px;
border-radius:10px;
overflow:auto;
margin-bottom:10px;
}

input{
width:70%;
padding:10px;
}

button{
padding:10px;
}
</style>
</head>

<body>

<h1>Bela AI ❤️</h1>

<div id="chat">
<p><b>Bela:</b> Hi, main Bela hoon ❤️</p>
</div>

<input type="text" id="msg" placeholder="Message likho">
<button onclick="sendMsg()">Send</button>

 <script>
async function sendMsg() {
  let msg = document.getElementById("msg").value;
  if (!msg) return;

  let chat = document.getElementById("chat");

  chat.innerHTML += `<p><b>You:</b> ${msg}</p>`;

  document.getElementById("msg").value = "";

  try {
    const res = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: msg
      })
    });

    const data = await res.json();

    chat.innerHTML += `<p><b>Bela:</b> ${data.reply}</p>`;
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    chat.innerHTML += `<p><b>Bela:</b> Error connecting to AI</p>`;
  }
}
 </script>
</body>
</html>
