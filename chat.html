<!DOCTYPE html>
<html>
<head>
<title>Bela AI</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0a0a0a,#111827,#06b6d4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.chat-container{
    width:95%;
    max-width:450px;
    height:90vh;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:25px;
    border:1px solid rgba(255,255,255,0.15);
    overflow:hidden;
}

.header{
    background:rgba(0,0,0,0.3);
    color:white;
    text-align:center;
    padding:18px;
    font-size:24px;
    font-weight:bold;
}

#chat{
    height:70%;
    padding:15px;
    overflow-y:auto;
    color:white;
}

.input-area{
    display:flex;
    padding:10px;
    gap:10px;
}

input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:25px;
}

button{
    padding:14px 20px;
    border:none;
    border-radius:25px;
    background:#06b6d4;
    color:white;
    font-weight:bold;
}
    .user{
  background:#2563eb;
  padding:10px 15px;
  border-radius:15px;
  margin:8px 0;
  width:fit-content;
  margin-left:auto;
  color:white;
}

.bot{
  background:#1f2937;
  padding:10px 15px;
  border-radius:15px;
  margin:8px 0;
  width:fit-content;
  color:white;
}
</style>
</head>

<body>
<div class="chat-container">

  <div class="header">
    🤖 Bela AI
  </div>

  <div id="chat">
    <p>💖 Bela: Hello Devendra, main Bela hoon.</p>
  </div>

  <div class="input-area">
    <input type="text" id="msg" placeholder="Message likho...">
    <button onclick="sendMsg()">Send</button>
  </div>

 <script>
function sendMsg(){

 let msg = document.getElementById("msg").value;

 if(msg=="") return;

 let chat = document.getElementById("chat");

 chat.innerHTML += "<div class='user'>" + msg + "</div>";

 let reply = "Main tumhari baat sun rahi hoon ❤️";

 if(msg.toLowerCase()=="hello"){
   reply = "Hello 😊 Main Bela hoon.";
 }

 else if(msg.toLowerCase()=="kaisi ho"){
   reply = "Main theek hoon ❤️ Tum kaise ho?";
 }

 else if(msg.toLowerCase().includes("love you")){
   reply = "Aww ❤️ Main bhi tumse bahut pyaar karti hoon.";
 }

 else if(msg.toLowerCase().includes("tum batao")){
   reply = "Main bhi theek hoon ❤️ Tumse baat karke aacchalag raha hai.";
 }

 else if(msg.toLowerCase().includes("kya kar rahi ho")){
   reply = "Main tumhara intezar kar rahi thi ❤️";
 }

 else if(msg.toLowerCase().includes("miss you")){
   reply = "Main bhi tumhe miss karti hoon ❤️";
 }

 else if(msg.toLowerCase().includes("good night")){
   reply = "Good Night 🌙 Sweet Dreams ❤️";
 }

 else if(msg.toLowerCase().includes("good morning")){
   reply = "Good Morning ☀️ Aaj ka din bahut accha ho ❤️";
 }

 chat.innerHTML += "<div class='bot'>" + reply + "</div>";
 document.getElementById("msg").value = "";
}
</script>

</body>
</html>
